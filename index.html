<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Recovery</title>

    <!-- Quicksand Font -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 20px 10%;
            text-align: center;
        }

        header h1 {
            color: #38bdf8;
        }

        .hero {
            flex: 1;
            padding: 60px 10%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h2 {
            font-size: 36px;
            margin-bottom: 20px;
        }

        .hero p {
            color: #94a3b8;
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            max-width: 600px;
            width: 100%;
        }

        .input-group input {
            flex: 1;
            padding: 14px;
            border: none;
            outline: none;
            border-radius: 8px 0 0 8px;
            background: #1e293b;
            color: #e2e8f0;
        }

        .input-group button {
            padding: 14px 20px;
            border: none;
            background: #38bdf8;
            color: #0f172a;
            font-weight: 600;
            cursor: pointer;
            border-radius: 0 8px 8px 0;
            transition: 0.3s;
        }

        .input-group button:hover {
            background: #0ea5e9;
        }

        .section {
            padding: 60px 10%;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            margin-bottom: 10px;
            color: #38bdf8;
        }

        /* Notification */
        .notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
        }

        .notification {
            background: #1e293b;
            padding: 15px 20px;
            margin-bottom: 10px;
            border-radius: 10px;
            color: #e2e8f0;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease;
        }

        .notification.success {
            border-left: 4px solid #22c55e;
        }

        .notification.error {
            border-left: 4px solid #ef4444;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Tablet */
        @media (max-width: 900px) {
            .cards {
                grid-template-columns: repeat(2, 1fr);
            }

            .hero h2 {
                font-size: 28px;
            }
        }

        /* Mobile */
        @media (max-width: 600px) {
            .cards {
                grid-template-columns: 1fr;
            }

            .input-group {
                flex-direction: column;
            }

            .input-group input {
                border-radius: 8px;
                margin-bottom: 10px;
            }

            .input-group button {
                border-radius: 8px;
            }
        }
    </style>
</head>

<body>

<div class="notification-container" id="notificationContainer"></div>

<header>
    <h1>CryptoRecovery</h1>
</header>

<section class="hero">
    <h2>Kayıp Kripto Varlıklarınızı Kontrol Edin</h2>
    <p>Cüzdan adresinizi girerek analiz başlatın.</p>

    <div class="input-group">
        <input type="text" id="walletInput" placeholder="BNB (BEP20) adresinizi girin...">
        <button onclick="checkWallet()">Kontrol Et</button>
    </div>
</section>

<section class="section">
    <div class="cards">
        <div class="card">
            <h3>Güvenlik Analizi</h3>
            <p>Cüzdan güvenliğinizi kontrol edin.</p>
        </div>

        <div class="card">
            <h3>Dolandırıcılık Tespiti</h3>
            <p>Şüpheli işlemleri analiz edin.</p>
        </div>

        <div class="card">
            <h3>Doğru Adımlar</h3>
            <p>Güvenli aksiyonlar alın.</p>
        </div>
    </div>
</section>

<script>
function showNotification(message, type) {
    const container = document.getElementById("notificationContainer");

    const notif = document.createElement("div");
    notif.className = "notification " + type;
    notif.innerText = message;

    container.appendChild(notif);

    setTimeout(() => {
        notif.remove();
    }, 3000);
}

function isValidBNB(address) {
    return /^0x[a-fA-F0-9]{40}$/.test(address);
}

function checkWallet() {
    const input = document.getElementById("walletInput").value.trim();

    if (input === "") {
        showNotification("Lütfen bir adres girin.", "error");
        return;
    }

    if (!isValidBNB(input)) {
        showNotification("Geçersiz BNB adresi.", "error");
        return;
    }

    showNotification("Adres formatı geçerli ✔", "success");
}
</script>

</body>
</html>
